<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ailey Bailey Canvas - Bundled Chatbot</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script>
    const __firebase_config = typeof __firebase_config !== "undefined" ? __firebase_config : '{ "apiKey": "YOUR_KEY", "projectId": "YOUR_PROJECT" }';
    const __initial_auth_token = typeof __initial_auth_token !== "undefined" ? __initial_auth_token : null;
  </script>
  <link rel="stylesheet" href="main.css">
</head>
<body class="dark-mode">
  <div class="wrapper toc-hidden">
    <main class="container">
      <header class="header"><h1>AI 챗봇 MVP</h1><p class="subtitle">(정적 번들링 최종 버전)</p></header>
      <section class="content-section"><p>좌측 하단 <strong>채팅 아이콘</strong>을 클릭하여 AI 챗봇을 열어주세요.</p></section>
    </main>
  </div>
  <div class="fixed-tool-container">
    <div id="chat-toggle-btn" class="tool-button" title="AI 러닝메이트">
      <svg viewBox="0 0 24 24" width="28" height="28"><path fill="currentColor" d="M20,2H4A2,2 0 0,0 2,4V22L6,18H20A2,2 0 0,0 22,16V4A2,2 0 0,0 20,2Z" /></svg>
    </div>
  </div>
  <div id="chat-panel" class="draggable-panel" style="width: 700px; height: 600px; bottom: 100px; right: 100px;">
    <div id="chat-session-sidebar">
      <div id="sidebar-header">
        <div class="sidebar-button-group">
          <button id="new-chat-btn"><svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.13,5.12L18.88,8.87M3,17.25V21H6.75L17.81,9.94L14.06,6.19L3,17.25Z" /></svg><span>새 대화</span></button>
          <button id="new-project-btn"><svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M4,6H2V20A2,2 0 0,0 4,22H18V20H4V6M20,2H8A2,2 0 0,0 6,4V16A2,2 0 0,0 8,18H20A2,2 0 0,0 22,16V4A2,2 0 0,0 20,2M13,13H11V10H8V8H11V5H13V8H16V10H13V13Z" /></svg><span>새 프로젝트</span></button>
        </div>
        <input type="text" id="search-sessions-input" placeholder="대화/프로젝트 검색...">
      </div>
      <div id="session-list-container"></div>
    </div>
    <div id="chat-main-view">
      <div class="panel-header" style="background: #2a2a2a; border-bottom: 1px solid #333">
        <div style="display: flex; align-items: center; gap: 10px;">
          <select id="ai-model-selector"></select>
          <span id="chat-session-title">AI 러닝메이트</span>
        </div>
        <button id="delete-session-btn" class="close-btn" style="display:none;" title="세션 삭제"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z" /></svg></button>
      </div>
      <div id="chat-messages"><div id="chat-welcome-message"><h3>AI 러닝메İt</h3><p>무엇이든 물어보세요!</p></div></div>
      <form id="chat-input-form">
        <textarea id="chat-input" placeholder="AI 러닝메이트에게 질문하기..." rows="1"></textarea>
        <button type="submit" id="chat-send-btn"><svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z" /></svg></button>
      </form>
    </div>
  </div>
  <script src="main.js" defer></script>
</body>
</html>
