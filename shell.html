<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Interactive Shell Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #app-container { min-height: 150px; border: 2px dashed #007bff; padding: 15px; margin: 20px 0; background-color: #f8f9fa; }
        .instructions { background-color: #fffbe6; border: 1px solid #ffe58f; padding: 15px; border-radius: 5px; margin-bottom: 15px;}
        textarea { width: 100%; min-height: 150px; margin-top: 10px; font-family: monospace; }
        button { margin-right: 10px; padding: 10px 15px; font-size: 1em; cursor: pointer; }
        .topic-card { border: 1px solid #28a745; background-color: #e9f7ef; padding: 20px; border-radius: 8px; }
        .topic-card h2 { color: #28a745; }
    </style>
</head>
<body>
    <h1>정적 셸 + 대화형 수화(Hydration) 테스트</h1>
    <div class="instructions">
        <strong>테스트 절차:</strong><br>
        1. 아래 "1. 명령어 생성" 버튼을 클릭하여 Gemini에게 보낼 명령어를 생성하세요.<br>
        2. 생성된 명령어를 복사하여 Gemini 대화창에 붙여넣고 전송하세요.<br>
        3. Gemini가 생성해 준 HTML 코드 블록을 복사하여 아래 텍스트 영역에 붙여넣으세요.<br>
        4. "3. 콘텐츠 주입" 버튼을 클릭하여 아래 점선 박스 안의 내용이 바뀌는지 확인하세요.
    </div>
    <div>
        <button id="generate-command-btn">1. 명령어 생성 & 복사</button>
        <button id="inject-content-btn">3. 콘텐츠 주입</button>
    </div>
    <textarea id="paste-area" placeholder="2. 여기에 Gemini가 생성한 HTML 코드를 붙여넣으세요..."></textarea>
    <hr>
    <h2>결과 확인:</h2>
    <div id="app-container">
        <p>아직 콘텐츠가 주입되지 않았습니다.</p>
    </div>

    <script src="https://lemos999.github.io/ailey-bailey-canvas/hybrid_main.js"></script>
</body>
</html>
